<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A030;--gold2:#E8C96A;--dark:#080D1A}

.h-logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;letter-spacing:3px}
.h-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0}
.h-sub{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);opacity:.85}
.h-year{margin-left:auto;font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:rgba(255,255,255,.35)}

#vi{position:absolute;top:76px;left:32px;z-index:10;pointer-events:none}
.vi-name{font-family:'Cormorant Garamond',serif;font-size:20px;color:rgba(255,255,255,.75);display:block;line-height:1.2}
.vi-angle{font-family:'Space Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:2px;display:block;margin-top:4px}

#view-controls{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px;background:rgba(8,13,26,.88);border:1px solid rgba(201,160,48,.2);border-radius:60px;padding:7px;backdrop-filter:blur(12px)}
.vbtn{padding:8px 18px;border:none;border-radius:50px;background:transparent;color:rgba(255,255,255,.45);font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .25s;white-space:nowrap}
.vbtn:hover{color:#fff;background:rgba(201,160,48,.12)}
.vbtn.active{background:var(--gold);color:#1A1008;font-weight:700}
#hint{position:absolute;bottom:82px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:22px;font-family:'Space Mono',monospace;font-size:8px;color:rgba(255,255,255,.2);pointer-events:none;white-space:nowrap}

#info-panel{position:absolute;top:0;right:0;width:370px;height:100%;z-index:10;background:rgba(8,13,26,.95);border-left:1px solid rgba(201,160,48,.18);backdrop-filter:blur(20px);transform:translateX(100%);transition:transform .42s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:70px 0 130px}
#info-panel.open{transform:translateX(0)}
#info-panel::-webkit-scrollbar{width:3px}
#info-panel::-webkit-scrollbar-thumb{background:rgba(201,160,48,.3);border-radius:2px}
.ip-topbar{height:3px;background:linear-gradient(to right,var(--gold2),var(--gold))}
#info-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border:1px solid rgba(255,255,255,.1);border-radius:50%;background:transparent;color:rgba(255,255,255,.4);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:3}
#info-close:hover{background:rgba(255,255,255,.1);color:#fff}
.ip-inner{padding:0 28px}
.ip-kicker{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin:26px 0 6px;display:flex;align-items:center;gap:8px}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function setP(pct, msg) {
  document.getElementById('ld-fill').style.width = pct+'%';
  document.getElementById('ld-pct').textContent  = pct+'%';
  if (msg) document.getElementById('ld-msg').textContent = msg;
}

function b64toURL(b64, mime) {
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return URL.createObjectURL(new Blob([buf], { type: mime }));
}

// ─── SCENE ───────────────────────────────────────────────────────────────────
setP(5, 'Decodificando archivos…');

const data = window.TROPHY_DATA;
const modelURL = b64toURL(data.fbx,      'application/octet-stream');
const texURLs  = {
  diffuse:    b64toURL(data.diffuse,   'image/png'),
  normal:     b64toURL(data.normal,    'image/png'),
  roughness:  b64toURL(data.roughness, 'image/png'),
  metallic:   b64toURL(data.metallic,  'image/png'),
};
setP(12, 'Iniciando escena 3D…');

const canvas   = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled   = true;
renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
renderer.outputColorSpace    = THREE.SRGBColorSpace;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x060A14);
scene.fog = new THREE.FogExp2(0x060A14, 0.003);

// Environment map for realistic PBR reflections
const pmrem  = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
const envTex = pmrem.fromScene(new RoomEnvironment(renderer), 0.04).texture;
scene.environment = envTex;

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.01, 2000);
camera.position.set(2, 1.5, 3.5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping    = true;
controls.dampingFactor    = 0.06;
controls.minDistance      = 0.4;
controls.maxDistance      = 14;
controls.autoRotate       = true;
controls.autoRotateSpeed  = 0.5;
controls.addEventListener('start', () => { controls.autoRotate = false; animating = false; });

// ─── LIGHTING (subida) ───────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xFFEEC0, 1.2));

const key = new THREE.DirectionalLight(0xFFE080, 4.0);
key.position.set(3, 6, 4);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = key.shadow.camera.bottom = -3;
key.shadow.camera.right = key.shadow.camera.top   =  3;
scene.add(key);

const fill = new THREE.DirectionalLight(0xA0BBFF, 1.0);
fill.position.set(-5, 4, 2);
scene.add(fill);

const rim = new THREE.DirectionalLight(0xFFBB40, 1.5);
rim.position.set(1, 3, -6);
scene.add(rim);

const top = new THREE.DirectionalLight(0xFFFFFF, 0.8);
top.position.set(0, 10, 0);
scene.add(top);

const front = new THREE.PointLight(0xFFDD88, 1.2, 10);
front.position.set(0, 1, 3);
scene.add(front);

const bot = new THREE.PointLight(0xC9A030, 0.8, 6);
bot.position.set(0, -0.3, 1);
scene.add(bot);

// Ground reflection disc
const ground = new THREE.Mesh(
  new THREE.CircleGeometry(4, 64),
  new THREE.MeshStandardMaterial({ color:0x08060E, metalness:0.5, roughness:0.7, transparent:true, opacity:0.55 })
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// ─── RENDER LOOP ─────────────────────────────────────────────────────────────
let animating = false;
const animFrom = { pos: new THREE.Vector3(), tgt: new THREE.Vector3() };
const animTo   = { pos: new THREE.Vector3(), tgt: new THREE.Vector3() };
let animT = 0;
const ANIM_DUR = 80;

function easeIO(t){ return t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; }

function tickAnim(){
  if (!animating) return;
  animT++;
  const e = easeIO(Math.min(animT/ANIM_DUR, 1));
  camera.position.lerpVectors(animFrom.pos, animTo.pos, e);
  controls.target.lerpVectors(animFrom.tgt, animTo.tgt, e);
  if (animT >= ANIM_DUR) {
    animating = false;
    setTimeout(() => controls.autoRotate = true, 1800);
  }
}

(function loop(){ requestAnimationFrame(loop); tickAnim(); controls.update(); renderer.render(scene, camera); })();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── MODEL LOAD ──────────────────────────────────────────────────────────────
setP(18, 'Cargando texturas…');
const tl = new THREE.TextureLoader();
function loadTex(url, srgb){ const t=tl.load(url); if(srgb) t.colorSpace=THREE.SRGBColorSpace; return t; }

const tex = {
  diffuse:   loadTex(texURLs.diffuse,   true),
  normal:    loadTex(texURLs.normal,    false),
  roughness: loadTex(texURLs.roughness, false),
  metallic:  loadTex(texURLs.metallic,  false),
};

setP(28, 'Cargando modelo FBX…');

const fbxLoader = new FBXLoader();
fbxLoader.load(
  modelURL,
  (obj) => {
    setP(88, 'Aplicando materiales PBR…');

    const mat = new THREE.MeshStandardMaterial({
      map:          tex.diffuse,
      normalMap:    tex.normal,
      roughnessMap: tex.roughness,
      metalnessMap: tex.metallic,
      metalness:    1.0,
      roughness:    1.0,
      envMapIntensity: 1.8,
    });

    obj.traverse(child => {
      if (!child.isMesh) return;
      child.castShadow = child.receiveShadow = true;
      child.material = mat;
    });

    // Center + scale to ~2 units tall
    const box    = new THREE.Box3().setFromObject(obj);
    const size   = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const s      = 2.0 / Math.max(size.x, size.y, size.z);
    obj.scale.setScalar(s);
    obj.position.set(-center.x*s, -box.min.y*s, -center.z*s);
    scene.add(obj);

    // Recompute bounds
    const box2   = new THREE.Box3().setFromObject(obj);
    const sphere = box2.getBoundingSphere(new THREE.Sphere());
    const mC     = sphere.center;
    const mR     = sphere.radius;

    controls.target.copy(mC);

    // Build presets
    const viewPresets = {};
    const dist = mR * 2.8;
    Object.entries(VIEWS).forEach(([id, v]) => {
      viewPresets[id] = {
        camPos: new THREE.Vector3(
          mC.x + dist * Math.sin(v.phi) * Math.sin(v.theta),
          mC.y + dist * Math.cos(v.phi),
          mC.z + dist * Math.sin(v.phi) * Math.cos(v.theta)
        ),
        target: mC.clone(),
      };
    });
    viewPresets['superior'] = {
      camPos: new THREE.Vector3(mC.x+0.05, mC.y+mR*3.5, mC.z+mR*0.2),
      target: new THREE.Vector3(mC.x, mC.y+mR*0.3, mC.z),
    };

    function goToView(id, animate=true) {
      const p = viewPresets[id]; if (!p) return;
      if (!animate) { camera.position.copy(p.camPos); controls.target.copy(p.target); controls.update(); return; }
      animFrom.pos.copy(camera.position); animFrom.tgt.copy(controls.target);
      animTo.pos.copy(p.camPos);          animTo.tgt.copy(p.target);
      animT = 0; animating = true;
    }

    // Go to initial view
    goToView('tres-cuartos', false);
    controls.update();

    // Revoke blob URLs
    URL.revokeObjectURL(modelURL);
    Object.values(texURLs).forEach(u => URL.revokeObjectURL(u));

    setP(100, '¡Listo!');
    setTimeout(() => {
      document.getElementById('loading').classList.add('fade');
      renderInfo('tres-cuartos');
      setTimeout(() => {
        document.getElementById('info-panel').classList.add('open');
        document.getElementById('info-toggle').style.display = 'none';
      }, 500);
    }, 400);

    // View buttons
    document.querySelectorAll('.vbtn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.view;
        document.querySelectorAll('.vbtn').forEach(b => b.classList.toggle('active', b.dataset.view===id));
        const v = VIEWS[id];
        document.getElementById('vi-name').textContent  = v.name;
        document.getElementById('vi-angle').textContent = v.angle;
        goToView(id, true);
        renderInfo(id);
        controls.autoRotate = false;
      });
    });
  },
  xhr => {
    if (xhr.total > 0) setP(28 + Math.round(xhr.loaded/xhr.total*55), `Cargando FBX… ${Math.round(xhr.loaded/1024/1024,1)}MB`);
  },
  err => {
    document.getElementById('ld-msg').textContent = '⚠ Error al cargar modelo';
    console.error(err);
  }
);

// ─── INFO PANEL ──────────────────────────────────────────────────────────────
function renderInfo(id) {
  const v = VIEWS[id]; const groups = SPECS[id] || [];
  let html = `<div class="ip-kicker">${v.name}</div><div class="ip-title">${v.name}</div><div class="ip-angle">${v.angle}</div><div class="ip-badge">${v.badge}</div><div class="ip-divider"></div>`;
  groups.forEach(g => {
    html += `<div class="sg"><div class="sg-title">${g.title}</div>`;
    g.items.forEach(t => { html += `<div class="si"><div class="sd"></div><div class="st">${t}</div></div>`; });
    html += '</div>';
  });
  document.getElementById('ip-inner').innerHTML = html;
}

document.getElementById('info-close').addEventListener('click', () => {
  document.getElementById('info-panel').classList.remove('open');
  document.getElementById('info-toggle').style.display = 'flex';
});
document.getElementById('info-toggle').addEventListener('click', () => {
  document.getElementById('info-panel').classList.add('open');
  document.getElementById('info-toggle').style.display = 'none';
});
</script>
</body>
</html>
